<!DOCTYPE html>
<html>
<head>
<title>Products</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body{ font-family:Arial; background:#f5f5f5; }

.navbar{
    background:#156ee2;
    padding:12px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.nav-left ul{ list-style:none; display:flex; gap:20px; }
.nav-left ul li a{ color:white; text-decoration:none; font-size:15px; }
.nav-left ul li a:hover{ color:#00ffcc; }
.profile{
    width:40px; height:40px; border-radius:50%;
    background:#00cc66; color:white;
    display:flex; justify-content:center; align-items:center;
    font-weight:bold; font-size:18px; cursor:pointer;
}

#cartBtn{
    position:fixed; bottom:30px; right:30px;
    background:#156ee2; color:white; border:none;
    border-radius:50px; padding:14px 22px;
    font-size:16px; cursor:pointer; z-index:1000;
    box-shadow:0 4px 15px rgba(0,0,0,0.3);
    display:flex; align-items:center; gap:8px;
}
#cartBtn:hover{ background:#0f55b5; }
#cartCount{
    background:#ff3b3b; color:white; border-radius:50%;
    width:22px; height:22px; display:flex;
    align-items:center; justify-content:center;
    font-size:12px; font-weight:bold;
}

#toast{
    position:fixed; bottom:100px; right:30px;
    background:#222; color:white; padding:14px 20px;
    border-radius:10px; z-index:2000; display:none;
    flex-direction:column; gap:10px;
    box-shadow:0 4px 15px rgba(0,0,0,0.3); min-width:220px;
}
#toast p{ font-size:14px; margin:0; }
#toast .toast-btns{ display:flex; gap:8px; }
#toast .toast-btns button{
    flex:1; padding:6px; border:none;
    border-radius:5px; cursor:pointer; font-size:13px; margin:0; width:auto;
}
#toast .goto{ background:#00cc66; color:white; }
#toast .close-t{ background:#555; color:white; }

#detailModal{
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.6); z-index:4000;
    justify-content:center; align-items:center; padding:20px;
}
#detailModal.show{ display:flex; }
#detailBox{
    background:white; border-radius:16px;
    width:100%; max-width:680px;
    max-height:90vh; overflow-y:auto;
}
#detailBox .detail-img{
    width:100%; height:320px;
    object-fit:cover; border-radius:16px 16px 0 0;
}
#detailBody{ padding:24px; }
#detailBody .detail-badge{
    display:inline-block;
    background:#e8f4ff; color:#156ee2;
    font-size:12px; padding:3px 10px;
    border-radius:20px; margin-bottom:12px;
}
#detailBody h2{ font-size:22px; margin-bottom:8px; }
#detailBody .detail-rating{ color:#f5a623; font-size:16px; margin-bottom:8px; }
#detailBody .detail-price{
    font-size:24px; font-weight:bold;
    color:#156ee2; margin-bottom:12px;
}
#detailBody .detail-desc{
    font-size:14px; color:#555;
    line-height:1.7; margin-bottom:16px;
}
#detailBody .detail-features{
    background:#f9f9f9; border-radius:8px;
    padding:12px 16px; margin-bottom:20px;
}
#detailBody .detail-features h4{ font-size:13px; color:#333; margin-bottom:8px; }
#detailBody .detail-features ul{ list-style:none; padding:0; }
#detailBody .detail-features ul li{ font-size:13px; color:#555; padding:3px 0; }
#detailBody .detail-features ul li::before{ content:"✓ "; color:#00cc66; }
.detail-btns{ display:flex; gap:12px; }
.detail-btns button{
    flex:1; padding:12px; border:none;
    border-radius:8px; font-size:15px;
    cursor:pointer; font-weight:bold; margin:0; width:auto;
}
.btn-add{ background:#156ee2; color:white; }
.btn-add:hover{ background:#0f55b5; }
.btn-close{ background:#f0f0f0; color:#333; }
.btn-close:hover{ background:#ddd; }

#cartModal{
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.5); z-index:3000;
    justify-content:center; align-items:center;
}
#cartModal.show{ display:flex; }
#cartBox{
    background:white; width:90%; max-width:500px;
    border-radius:12px; padding:24px; max-height:80vh; overflow-y:auto;
}
#cartBox h2{
    margin-bottom:16px; font-size:20px;
    border-bottom:1px solid #eee; padding-bottom:10px;
}
.cart-item{
    display:flex; justify-content:space-between;
    align-items:center; padding:10px 0;
    border-bottom:1px solid #f0f0f0; font-size:14px;
}
.cart-item button{
    background:red; color:white; border:none;
    padding:4px 10px; border-radius:4px;
    cursor:pointer; width:auto; margin:0; font-size:12px;
}
#closeCart{
    margin-top:16px; width:100%; padding:10px;
    background:#156ee2; color:white; border:none;
    border-radius:6px; cursor:pointer; font-size:15px;
}

#searchHeader{
    padding:20px 40px 0;
    font-size:16px;
    color:#333;
    display:none;
    align-items:center;
    gap:12px;
}
#searchHeader a{
    font-size:13px;
    color:#156ee2;
    text-decoration:none;
}

.products{
    padding:40px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}
.card{
    background:white; padding:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    text-align:center; border-radius:8px;
    transition:transform 0.2s, box-shadow 0.2s;
}
.card:hover{
    transform:translateY(-4px);
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}
.card img{
    width:100%; height:200px; object-fit:cover;
    border-radius:5px; cursor:pointer;
}
.card h3{ margin-top:10px; font-size:15px; cursor:pointer; }
.card h3:hover{ color:#156ee2; }
.card .price{ color:#156ee2; font-weight:bold; margin:6px 0; font-size:14px; }
.card button{
    margin-top:10px; padding:8px; width:100%;
    background:#222; color:white; border:none;
    cursor:pointer; border-radius:4px;
}
.card button:hover{ background:#00cc66; }

#noResult{
    text-align:center;
    padding:60px 20px;
    color:#999;
    font-size:18px;
    display:none;
    grid-column: 1/-1;
}
</style>
</head>

</button>

    <div class="toast-btns">
        <button class="goto" onclick="openCart()">Go to Cart</button>
        <button class="close-t" onclick="closeToast()">✕ Close</button>
    </div>
</div>

<div id="detailModal">
    <div id="detailBox">
        <img id="detailImg" class="detail-img" src="" alt="">
        <div id="detailBody">
            <span class="detail-badge" id="detailBadge"></span>
            <h2 id="detailName"></h2>
            <div class="detail-rating" id="detailRating"></div>
            <div class="detail-price" id="detailPrice"></div>
            <p class="detail-desc" id="detailDesc"></p>

                <h4>Key Features</h4>
                <ul id="detailFeatures"></ul>
            </div>
            <div class="detail-btns">
                <button class="btn-add" id="detailCartBtn">🛒 Add to Cart</button>
                <button class="btn-close" onclick="closeDetail()">✕ Close</button>
            </div>
        </div>
    </div>
</div>

<div id="cartModal">
    <div id="cartBox">
        <h2>🛒 Your Cart</h2>
        <div id="cartItems"></div>
        <button id="closeCart" onclick="closeCart()">Close</button>
    </div>
</div>

<div id="searchHeader">
    <span id="searchHeaderText"></span>
    <a href="product.html">✕ Clear filter</a>
</div>

<div class="products" id="productsGrid">
    <div id="noResult">
        No results found for your search.<br>
        <a href="product.html" style="color:#156ee2;font-size:15px;">View all products</a>
    </div>
</div>

    { id:21, name:"Headphones", category:"Headphones", price:"$2,499", rating:"★★★★☆ (4.3)", img:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600&auto=format&fit=crop", desc:"Premium wired headphones with crystal-clear sound and deep bass.", features:["Crystal clear sound","Deep bass","Foldable design","3.5mm jack"], tags:["headphone","headphones","audio","music","wired","earphone"] },
    { id:22, name:"Wireless Headphones", category:"Headphones", price:"$4,999", rating:"★★★★★ (4.6)", img:"https://images.unsplash.com/photo-1580894908361-967195033215?w=600&auto=format&fit=crop", desc:"Wireless Bluetooth headphones with active noise cancellation. 30-hour battery life.", features:["Noise cancellation","30hr battery","Bluetooth 5.0","Foldable"], tags:["headphone","headphones","wireless","bluetooth","audio","music"] },

    { id:24, name:"Earbuds", category:"Headphones", price:"$1,999", rating:"★★★★☆ (4.1)", img:"https://images.unsplash.com/photo-1590658268037-6bf12165a8df?w=600&auto=format&fit=crop", desc:"True wireless earbuds with excellent sound quality and comfortable fit.", features:["True wireless","20hr total battery","Touch controls","IPX4 water resistant"], tags:["earbuds","earbud","earphone","wireless","audio","music"] },
    { id:25, name:"Bluetooth Earphones", category:"Headphones", price:"$1,299", rating:"★★★★☆ (4.0)", img:"https://images.unsplash.com/photo-1606220945770-b5b6c2c55bf1?w=600&auto=format&fit=crop", desc:"Bluetooth neckband earphones with powerful sound and long battery life.", features:["Bluetooth 5.0","12hr battery","Magnetic earbuds","Built-in mic"], tags:["earphone","earphones","bluetooth","wireless","audio","neckband"] },
];

// ── SMART SEARCH ──
const urlParams = new URLSearchParams(window.location.search);
const searchQuery = urlParams.get("q");
let filteredProducts = products;

if(searchQuery){
    const q = searchQuery.toLowerCase().trim();
    filteredProducts = products.filter(p => {
        return (
            p.name.toLowerCase().includes(q) ||
            p.category.toLowerCase().includes(q) ||
            p.desc.toLowerCase().includes(q) ||
            p.tags.some(tag => tag.includes(q) || q.includes(tag))
        );
    });

    const header = document.getElementById("searchHeader");
    header.style.display = "flex";
    document.getElementById("searchHeaderText").innerText =
        filteredProducts.length > 0
        ? `Showing ${filteredProducts.length} results for "${searchQuery}"`
        : `No results found for "${searchQuery}"`;
}

// ── RENDER ──
const grid = document.getElementById("productsGrid");
if(filteredProducts.length === 0){
    document.getElementById("noResult").style.display = "block";
} else {
    filteredProducts.forEach(p => {
        grid.innerHTML += `
            <div class="card">
                <img src="${p.img}" alt="${p.name}" onclick="openDetail(${p.id})">
                <h3 onclick="openDetail(${p.id})">${p.name}</h3>
                <div class="price">${p.price}</div>
                <button onclick="addToCart('${p.name}')">Add to Cart</button>
            </div>
        `;
    });
}

// ── PRODUCT DETAIL ──
function openDetail(id){
    const p = products.find(x => x.id === id);
    document.getElementById("detailImg").src = p.img;
    document.getElementById("detailBadge").innerText = p.category;
    document.getElementById("detailName").innerText = p.name;
    document.getElementById("detailRating").innerText = p.rating;
    document.getElementById("detailPrice").innerText = p.price;
    document.getElementById("detailDesc").innerText = p.desc;
    document.getElementById("detailFeatures").innerHTML = p.features.map(f => `<li>${f}</li>`).join("");
    document.getElementById("detailCartBtn").onclick = () => { addToCart(p.name); closeDetail(); };
    document.getElementById("detailModal").classList.add("show");
}
function closeDetail(){ document.getElementById("detailModal").classList.remove("show"); }

// ── PROFILE ──
const user = localStorage.getItem("currentUser");
const profileEl = document.getElementById("profileLetter");
const container = document.getElementById("profileContainer");

if(user){
    profileEl.innerText = user.charAt(0).toUpperCase();
    const dropdown = document.createElement("div");
    dropdown.style.cssText = `display:none;position:absolute;right:0;top:50px;background:white;padding:15px;width:180px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.2);z-index:999;`;
    dropdown.innerHTML = `
        <p style="margin:5px 0;font-size:14px;"><strong>Name:</strong> ${user}</p>
        <button onclick="logout()" style="margin-top:10px;padding:5px;width:100%;border:none;background:red;color:white;border-radius:5px;cursor:pointer;">Logout</button>
    `;
    container.appendChild(dropdown);
    profileEl.addEventListener("click", () => {
        dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
    });
} else {
    container.innerHTML = `<a href="login.html" style="color:white;text-decoration:none;font-size:15px;">Login</a>`;
}

function logout(){
    localStorage.removeItem("loggedIn");
    localStorage.removeItem("currentUser");
    window.location.href = "login.html";
}

// ── CART ──
let cart = JSON.parse(localStorage.getItem("cart")) || [];
updateCartCount();

function addToCart(name){
    cart.push(name);
    localStorage.setItem("cart", JSON.stringify(cart));
    updateCartCount();
    showToast();
}
function updateCartCount(){ document.getElementById("cartCount").innerText = cart.length; }

let toastTimer;
function showToast(){
    const toast = document.getElementById("toast");
    toast.style.display = "flex";
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.style.display = "none", 3000);
}
function closeToast(){ document.getElementById("toast").style.display = "none"; }

function openCart(){
    closeToast();
    document.getElementById("cartModal").classList.add("show");
    const itemsDiv = document.getElementById("cartItems");
    if(cart.length === 0){
        itemsDiv.innerHTML = `<p style="text-align:center;color:#999;padding:20px;">Your cart is empty!</p>`;
    } else {
        itemsDiv.innerHTML = cart.map((item,i) => `
            <div class="cart-item">
                <span>${item}</span>
                <button onclick="removeFromCart(${i})">Remove</button>
            </div>
        `).join("");
    }
}
function removeFromCart(i){
    cart.splice(i,1);
    localStorage.setItem("cart", JSON.stringify(cart));
    updateCartCount();
    openCart();
}
function closeCart(){ document.getElementById("cartModal").classList.remove("show"); }
</script>

</body>
</html>
