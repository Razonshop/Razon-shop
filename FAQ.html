<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FAQ</title>
    
    <style>
        
    /* Navbar */
    <style>
* { margin:0; padding:0; box-sizing:border-box; }
body{ font-family:Arial; background:#f5f5f5; }

.navbar{
    background:#156ee2;
    padding:12px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.nav-left ul{ list-style:none; display:flex; gap:20px; }
.nav-left ul li a{ color:white; text-decoration:none; font-size:15px; }
.nav-left ul li a:hover{ color:#00ffcc; }
.profile{
    width:40px; height:40px; border-radius:50%;
    background:#00cc66; color:white;
    display:flex; justify-content:center; align-items:center;
    font-weight:bold; font-size:18px; cursor:pointer;
}
    
    /* Profile circle */
    #profileContainer{
        position: relative;
    }
    
    .profile-circle{
        width: 40px;
        height: 40px;
        background: #4CAF50;
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-weight: bold;
        font-size: 18px;
    }
    
    .profile-dropdown{
        display: none;
        position: absolute;
        right: 0;
        top: 50px;
        background: white;
        color: #333;
        padding: 10px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    
    .profile-dropdown p{
        margin: 5px 0;
    }
    
    .logout-btn{
        padding: 5px 10px;
        background: #764ba2;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
    </style>
    <link rel="stylesheet" href="faq.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="about us.html">About Us</a></li>
            <li><a href="search.html">Search</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li class="active"><a href="FAQ.html">FAQ</a></li>
            <li><a href="product.html">Products</a></li>
        </ul>
    </div>
    <div id="profileContainer" style="position:relative;">
        <div id="profileLetter" class="profile">U</div>
    </div>
</nav>

<div class="faq-container">
    <h1>Frequently Asked Questions</h1>

    <div class="faq-item">
        <button class="faq-question">How do I create an account?</button>
        <div class="faq-answer">
            <p>You can sign up using the Sign Up page and create your account easily.</p>
        </div>
    </div>

    <div class="faq-item">
        <button class="faq-question">Is my data secure?</button>
        <div class="faq-answer">
            <p>Yes, your data is stored securely in your browser.</p>
        </div>
    </div>

    <div class="faq-item">
        <button class="faq-question">Can I update my profile?</button>
        <div class="faq-answer">
            <p>Yes, you can update your profile anytime after logging in.</p>
        </div>
    </div>

    <div class="review-box">
        <h2>Leave Your Review</h2>
        <textarea id="reviewText" placeholder="Write your review here..."></textarea>
        <button onclick="submitReview()">Submit</button>
    </div>

    <div id="reviewsContainer"></div>
</div>

<script>
// Profile
const user = localStorage.getItem("currentUser");
const profileEl = document.getElementById("profileLetter");
const container = document.getElementById("profileContainer");

if(user){
    profileEl.innerText = user.charAt(0).toUpperCase();
    const dropdown = document.createElement("div");
    dropdown.style.cssText = `display:none;position:absolute;right:0;top:50px;background:white;padding:15px;width:180px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.2);z-index:999;`;
    dropdown.innerHTML = `
        <p style="margin:5px 0;font-size:14px;"><strong>Name:</strong> ${user}</p>
        <button onclick="logout()" style="margin-top:10px;padding:5px;width:100%;border:none;background:red;color:white;border-radius:5px;cursor:pointer;">Logout</button>
    `;
    container.appendChild(dropdown);
    profileEl.addEventListener("click", () => {
        dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
    });
} else {
    container.innerHTML = `<a href="login.html" style="color:white;text-decoration:none;font-size:15px;">Login</a>`;
}

function logout(){
    localStorage.removeItem("loggedIn");
    localStorage.removeItem("currentUser");
    window.location.href = "login.html";
}

// FAQ Toggle
document.querySelectorAll(".faq-question").forEach(button => {
    button.addEventListener("click", () => {
        const answer = button.nextElementSibling;
        answer.style.display = answer.style.display === "block" ? "none" : "block";
    });
});

// Reviews
function submitReview(){
    let review = document.getElementById("reviewText").value;
    if(review.trim() === ""){ alert("Please write something!"); return; }
    let reviews = JSON.parse(localStorage.getItem("reviews")) || [];
    reviews.push(review);
    localStorage.setItem("reviews", JSON.stringify(reviews));
    document.getElementById("reviewText").value = "";
    displayReviews();
}

function displayReviews(){
    let reviewsContainer = document.getElementById("reviewsContainer");
    let reviews = JSON.parse(localStorage.getItem("reviews")) || [];
    reviewsContainer.innerHTML = "";
    reviews.forEach(r => {
        reviewsContainer.innerHTML += `<div class="review">${r}</div>`;
    });
}
displayReviews();
</script>

</body>
</html>
