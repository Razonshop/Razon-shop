<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - Razonshop</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a2e;
            overflow: hidden;
        }

        /* STARS */
        .stars-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle linear infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.4); }
        }

        /* FLOATING SHAPES */
        .shape {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.15;
            animation: float linear infinite;
            z-index: 0;
        }
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(180deg); }
            100% { transform: translateY(0) rotate(360deg); }
        }

        /* CARD */
        .card {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 24px;
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 5;
            animation: slideUp 0.6s ease;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card .logo {
            text-align: center;
            margin-bottom: 24px;
        }

        .card .logo h1 {
            font-size: 26px;
            color: white;
            letter-spacing: 2px;
        }

        .card .logo span { color: #00ffcc; }

        .card h2 {
            font-size: 20px;
            color: white;
            text-align: center;
            margin-bottom: 28px;
            font-weight: 400;
        }

        .input-group {
            position: relative;
            margin-bottom: 18px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px 14px 46px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: border 0.3s, background 0.3s;
        }

        .input-group input::placeholder { color: rgba(255,255,255,0.4); }

        .input-group input:focus {
            border-color: #00ffcc;
            background: rgba(255,255,255,0.12);
        }

        .input-group .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #156ee2, #00aaff);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(21,110,226,0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(21,110,226,0.6);
        }

        .btn:active { transform: translateY(0); }

        .error-msg {
            color: #ff6b6b;
            font-size: 13px;
            text-align: center;
            margin-top: 10px;
            min-height: 18px;
        }

        .success-msg {
            color: #00ffcc;
            font-size: 13px;
            text-align: center;
            margin-top: 10px;
            min-height: 18px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }
        .divider hr {
            flex: 1;
            border: none;
            border-top: 1px solid rgba(255,255,255,0.15);
        }
        .divider span {
            color: rgba(255,255,255,0.4);
            font-size: 13px;
        }

        .bottom-link {
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
        .bottom-link a {
            color: #00ffcc;
            text-decoration: none;
            font-weight: bold;
        }
        .bottom-link a:hover { text-decoration: underline; }

        /* PASSWORD STRENGTH */
        .strength-bar {
            height: 4px;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
            margin-top: 6px;
            overflow: hidden;
        }
        .strength-fill {
            height: 100%;
            border-radius: 4px;
            width: 0%;
            transition: width 0.3s, background 0.3s;
        }
    </style>
</head>
<body>

<div class="stars-container" id="stars"></div>

<div class="shape" style="width:300px;height:300px;background:#156ee2;top:-100px;left:-100px;animation-duration:8s;"></div>
<div class="shape" style="width:250px;height:250px;background:#6a11cb;bottom:-80px;right:-80px;animation-duration:10s;"></div>
<div class="shape" style="width:180px;height:180px;background:#00ffcc;top:50%;left:80%;animation-duration:7s;"></div>

<div class="card">
    <div class="logo">
        <h1>RAZON<span>SHOP</span></h1>
    </div>
    <h2>Create your account</h2>

    <div class="input-group">
        <span class="icon">👤</span>
        <input type="text" id="signupName" placeholder="Full Name">
    </div>

    <div class="input-group">
        <span class="icon">📧</span>
        <input type="email" id="signupEmail" placeholder="Email Address">
    </div>

    <div class="input-group">
        <span class="icon">🔒</span>
        <input type="password" id="signupPassword" placeholder="Password" oninput="checkStrength(this.value)">
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    </div>

    <div class="input-group">
        <span class="icon">🔒</span>
        <input type="password" id="signupConfirm" placeholder="Confirm Password">
    </div>

    <button class="btn" onclick="signup()">Create Account</button>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <div class="divider"><hr><span>or</span><hr></div>

    <div class="bottom-link">
        Already have an account? <a href="login.html">Login</a>
    </div>
</div>

<script>
// Stars
const starsEl = document.getElementById("stars");
for(let i = 0; i < 150; i++){
    const s = document.createElement("div");
    s.classList.add("star");
    const size = Math.random() * 3 + 1;
    s.style.cssText = `
        width:${size}px; height:${size}px;
        top:${Math.random()*100}%;
        left:${Math.random()*100}%;
        animation-duration:${Math.random()*3+2}s;
        animation-delay:${Math.random()*3}s;
    `;
    starsEl.appendChild(s);
}

// Password strength
function checkStrength(val){
    const fill = document.getElementById("strengthFill");
    if(val.length === 0){ fill.style.width = "0%"; return; }
    if(val.length < 4){ fill.style.width = "25%"; fill.style.background = "#ff4444"; }
    else if(val.length < 7){ fill.style.width = "50%"; fill.style.background = "#ffaa00"; }
    else if(val.length < 10){ fill.style.width = "75%"; fill.style.background = "#00aaff"; }
    else { fill.style.width = "100%"; fill.style.background = "#00ffcc"; }
}

// Signup
function signup(){
    const name = document.getElementById("signupName").value.trim();
    const email = document.getElementById("signupEmail").value.trim();
    const pass = document.getElementById("signupPassword").value;
    const confirm = document.getElementById("signupConfirm").value;
    const errorMsg = document.getElementById("errorMsg");
    const successMsg = document.getElementById("successMsg");

    errorMsg.innerText = "";
    successMsg.innerText = "";

    if(!name){ errorMsg.innerText = "Please enter your name."; return; }
    if(!email){ errorMsg.innerText = "Please enter your email."; return; }
    if(pass.length < 6){ errorMsg.innerText = "Password must be at least 6 characters."; return; }
    if(pass !== confirm){ errorMsg.innerText = "Passwords do not match."; return; }

    // Check if user already exists
    const users = JSON.parse(localStorage.getItem("users")) || [];
    const exists = users.find(u => u.email === email);
    if(exists){ errorMsg.innerText = "Account already exists with this email."; return; }

    // Save user
    users.push({ name, email, password: pass });
    localStorage.setItem("users", JSON.stringify(users));

    successMsg.innerText = "Account created! Redirecting to login...";

    setTimeout(() => {
        window.location.href = "login.html";
    }, 1500);
}
</script>

</body>
</html>
