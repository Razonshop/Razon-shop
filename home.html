<!DOCTYPE html>
<html>

<head>
    <title>RAZONSHOP</title>
    <link rel="stylesheet" href="stylecontact.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        #vid-par {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        #my-vid {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%;
            min-height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        #vid-par::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(0,0,0,0.3) 0%,
                rgba(0,0,0,0.55) 50%,
                rgba(0,0,0,0.75) 100%
            );
            z-index: 1;
        }

        #hero-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
            width: 90%;
            max-width: 750px;
        }

        #hero-content .eyebrow {
            display: inline-block;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #f0b429;
            border: 1px solid #f0b429;
            padding: 6px 16px;
            border-radius: 20px;
            margin-bottom: 24px;
        }

        #hero-content h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(2.2rem, 6vw, 4.5rem);
            font-weight: 800;
            color: #ffffff;
            line-height: 1.1;
            letter-spacing: -1px;
            margin-bottom: 20px;
        }

        #hero-content h1 span {
            color: #f0b429;
        }

        #hero-content p {
            font-family: 'Inter', sans-serif;
            font-size: clamp(1rem, 2vw, 1.2rem);
            font-weight: 300;
            color: rgba(255,255,255,0.82);
            line-height: 1.7;
            margin-bottom: 36px;
            max-width: 520px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero-btns {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary {
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: #000;
            background: #f0b429;
            padding: 14px 32px;
            border-radius: 6px;
            text-decoration: none;
            letter-spacing: 0.5px;
            transition: background 0.2s, transform 0.2s;
        }

        .btn-primary:hover {
            background: #ffc843;
            transform: translateY(-2px);
        }

        .btn-secondary {
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 500;
            color: #fff;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.5);
            padding: 14px 32px;
            border-radius: 6px;
            text-decoration: none;
            letter-spacing: 0.5px;
            transition: border-color 0.2s, transform 0.2s;
        }

        .btn-secondary:hover {
            border-color: #fff;
            transform: translateY(-2px);
        }

        .scroll-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.5);
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .scroll-hint .line {
            width: 1px;
            height: 40px;
            background: rgba(255,255,255,0.3);
            animation: scrollLine 1.5s ease-in-out infinite;
        }

        @keyframes scrollLine {
            0% { transform: scaleY(0); transform-origin: top; }
            50% { transform: scaleY(1); transform-origin: top; }
            51% { transform: scaleY(1); transform-origin: bottom; }
            100% { transform: scaleY(0); transform-origin: bottom; }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="nav-left">
            <ul>
                <li class="active"><a href="home.html">Home</a></li>
                <li><a href="about us.html">About Us</a></li>
                <li><a href="search.html">Search</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="FAQ.html">FAQ</a></li>
                <li><a href="product.html">Products</a></li>         
            </ul>
        </div>
        <div id="profileContainer">
            <a href="login.html" id="authBtn">Login</a>
        </div>
    </nav>

    <section id="vid-par">
        <video id="my-vid" autoplay loop muted playsinline>
            <source type="video/mp4" src="Shubh - Bandana (Official Music Video).mp4">
        </video>

        <div id="hero-content">
            <span class="eyebrow">Welcome to Razonshop</span>
            <h1>Build Your Dreams,<br><span>Make It Real</span></h1>
            <p>Discover products crafted for people who move fast, think big, and never settle for ordinary.</p>
            <div class="hero-btns">
                <a href="product.html" class="btn-primary">Shop Now</a>
                <a href="about us.html" class="btn-secondary">Our Story</a>
            </div>
        </div>

        <div class="scroll-hint">
            <div class="line"></div>
            <span>Scroll</span>
        </div>
    </section>

    <style>
        .profile-circle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #4CAF50;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
        }

        .profile-dropdown {
            display: none;
            position: absolute;
            right: 0;
            margin-top: 10px;
            background: white;
            padding: 15px;
            width: 180px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .profile-dropdown p {
            margin: 5px 0;
            font-size: 14px;
        }

        .logout-btn {
            margin-top: 10px;
            padding: 5px;
            width: 100%;
            border: none;
            background: red;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>

    <script>
        let container = document.getElementById("profileContainer");
        
        if(localStorage.getItem("loggedIn") === "true"){
            let username = localStorage.getItem("currentUser");
            container.innerHTML = `
                <div class="profile-circle" id="avatar">
                    ${username ? username.charAt(0).toUpperCase() : "U"}
                </div>
                <div class="profile-dropdown" id="dropdown">
                    <p><strong>Name:</strong> ${username}</p>
                    <button onclick="logout()">Logout</button>
                </div>
            `;
            document.getElementById("avatar").addEventListener("click", function(){
                let dropdown = document.getElementById("dropdown");
                dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
            });
        } else {
            container.innerHTML = `<a href="login.html">Login</a>`;
        }
        
        function logout(){
            localStorage.removeItem("loggedIn");
            localStorage.removeItem("currentUser");
            window.location.href = "login.html";
        }
    </script>

</body>
</html>
